# GPU server with NVIDIA GPU + CUDA.
# Usage:  docker compose -f docker-compose-gpu.yml up -d --build

services:
  nsfw-detector:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: nsfw-detector-service:gpu
    container_name: nsfw-detector
    env_file: .env
    ports:
      - "${PORT:-8085}:${PORT:-8085}"
    environment:
      - USE_GPU=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:${PORT:-8085}/health'); sys.exit(0 if r.status==200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - km4u-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  km4u-network:
    name: "km4u-network"
    driver: bridge
    external: true