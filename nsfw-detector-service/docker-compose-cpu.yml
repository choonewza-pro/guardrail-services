# CPU-only server (no NVIDIA GPU).
# Usage:  docker compose -f docker-compose-cpu.yml up -d --build

services:
  nsfw-detector:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: nsfw-detector-service:cpu
    container_name: nsfw-detector
    env_file: .env
    ports:
      - "${PORT:-8085}:${PORT:-8085}"
    environment:
      - DEVICE=cpu
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:${PORT:-8085}/health'); sys.exit(0 if r.status==200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - km4u-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  km4u-network:
    name: "km4u-network"
    driver: bridge
    external: true