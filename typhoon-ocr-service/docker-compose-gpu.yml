# NVIDIA GPU server (CUDA runtime required).
# Usage: docker compose -f docker-compose-gpu.yml up -d --build

services:
  typhoon-ocr:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: typhoon-ocr-service:gpu
    container_name: typhoon-ocr
    env_file: .env.gpu
    ports:
      - "${PORT:-8087}:${PORT:-8087}"
    environment:
      - DEVICE=cuda
    volumes:
      - hf-cache:/app/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:${PORT:-8087}/health'); sys.exit(0 if r.status==200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - km4u-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  km4u-network:
    name: "km4u-network"
    driver: bridge
    external: true

volumes:
  hf-cache:
