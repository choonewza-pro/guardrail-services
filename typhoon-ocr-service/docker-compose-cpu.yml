# CPU-only server (no NVIDIA GPU).
# Usage: docker compose -f docker-compose-cpu.yml up -d --build

name: typhoon-ocr-cpu

services:
  typhoon-ocr-cpu:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: typhoon-ocr-service:cpu
    container_name: typhoon-ocr-cpu
    env_file: .env.cpu
    ports:
      - "8088:8088"
    environment:
      - PORT=8088
      - DEVICE=cpu
    volumes:
      - typhoon-ocr-cache:/app/.cache
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8088/health'); sys.exit(0 if r.status==200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - km4u-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  km4u-network:
    name: "km4u-network"
    driver: bridge
    external: true

volumes:
  typhoon-ocr-cache:
    external: true
    name: "typhoon-ocr-cache"
